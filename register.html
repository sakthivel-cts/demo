<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Cognizant | Register</title>
</head>

<body>
    <div class="d-flex justify-content-between p-3 bg-light">
        <h1 class="fw-bold">Cognizant</h1>

        <div>
            <ul class="d-flex list-unstyled align-items-center gap-2">
                <li class="p-2 text-center rounded"><a class="anchor-property-remove text-black" href="./index.html">Home</a></li>
                <li class="p-2 text-center rounded"><a class="anchor-property-remove text-black" href="#">Products</a></li>
                <li class="p-2 text-center rounded"><a class="anchor-property-remove text-black" href="#">Contact</a></li>
                <li class="bg-primary p-2 text-center text-white rounded"><a class="anchor-property-remove text-white" href="./login.html">Login</a></li>
                <li class="bg-success p-2 text-center text-white rounded"><a class="anchor-property-remove text-white" href="./register.html">Register</a></li>
            </ul>
        </div>
    </div>


    <div>
        <h6 class="text-center mt-4 title">Register</h6>

        <form class="container d-flex align-items-center flex-column">
            <div class="col-8">
                <label for="email">Email</label>
                <input id="email" type="text" class="form-control" placeholder="Email">
            </div>
            <div class="col-8">
                <label for="username">Mobile Number</label>
                <input id="username" type="number" class="form-control" placeholder="Mobile Number">
            </div>
            <div class="col-8">
                <label for="password">Password</label>
                <input type="password" class="form-control" placeholder="Password">
            </div>
            <div class="col-8">
                <label for="confirmpassword">confirm Password</label>
                <input id="confirmpassword" type="password" class="form-control" placeholder="Confirm Password">
            </div>

            <div class="mt-4 col-6">
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </div>

            <div class="col-6 text-center">
                <h4 class="my-4 fs-6">If you already have an account, Please login using that account</h4>
                <a class="btn btn-secondary w-100" href="./index.html">Login</a>
            </div>
        </form>
    </div>


    <footer class="bg-light container-fluid">
        <div class="row p-3 mt-4">
            <h1 class="fw-bold col-4">Cognizant</h1>

            <div class="col-4">
                <ul class="list-unstyled gap-2">
                    <li><a class="anchor-property-remove" href="./index.html">Home</a></li>
                    <li><a class="anchor-property-remove" href="./products.html">Products</a></li>
                    <li><a class="anchor-property-remove" href="#">Contact</a></li>
                </ul>
            </div>

            <div class="col-4">
                <ul class="list-unstyled gap-2">
                    <li><a class="anchor-property-remove" href="#">Terms and Conditions</a></li>
                    <li><a class="anchor-property-remove" href="#">Privacy Policy</a></li>
                    <li><a class="anchor-property-remove" href="#">Help Desk</a></li>
                </ul>
            </div>
        </div>

        <div class="col-12 text-center">
            <p style="font-size:small; color:grey;">@Cognizant</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
